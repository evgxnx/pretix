services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pretix
      POSTGRES_PASSWORD: pretix
      POSTGRES_DB: pretix
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pretix"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  pretix:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - pretix-data:/data
      - ./pretix.cfg:/etc/pretix/pretix.cfg:ro
    environment:
      AUTOMIGRATE: "yes"

volumes:
  pgdata:
  pretix-data:
