version: "3.9"

services:
  pretix:
    image: pretix/standalone:stable
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./data:/data
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pretix
      POSTGRES_DB: pretix
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./db-data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: unless-stopped